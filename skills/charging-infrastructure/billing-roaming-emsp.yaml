- OCPI library (Python ocpi, Java/Spring Boot custom)
- Payment gateway SDK (Stripe, Braintree)
- Mobile app framework (React Native, Flutter)
- API gateway (Kong, AWS API Gateway)
- Database (PostgreSQL for transactional, MongoDB for sessions)
