      from tools.adapters.logging import DLTAdapter

      # Different subsystems
      main = DLTAdapter(app_id="ADAS", context_id="MAIN")
      sensors = DLTAdapter(app_id="ADAS", context_id="SENS")
      control = DLTAdapter(app_id="ADAS", context_id="CTRL")

      main.log_info("Application started")
      sensors.log_debug("Camera initialized")
      control.log_info("Control loop started")

      # Cleanup
      for logger in [main, sensors, control]:
          logger.close()

best_practices:
  - Use meaningful 4-character app IDs (e.g., ADAS, CTRL, DIAG)
  - Create separate contexts for different subsystems
  - Use appropriate log levels (FATAL for critical, INFO for normal)
  - Include structured data as kwargs for better filtering
  - Set log level filtering in production to avoid overhead
  - Use DLT Viewer for real-time monitoring during development
  - Archive DLT files regularly (they can grow large)
  - Use ECU IDs to distinguish logs in multi-ECU systems
  - Enable verbose mode for development, non-verbose for production
  - Close DLT adapters properly to flush buffered data

troubleshooting:
  - "Cannot connect to DLT daemon": Check if dlt-daemon is running (systemctl status dlt-daemon)
  - "Log file not created": Verify directory permissions and path exists
  - "Messages not appearing in DLT Viewer": Check app ID and context ID filters
  - "High logging overhead": Reduce log level or use non-verbose mode
  - "Corrupted DLT file": Ensure proper close() or use context manager
  - "Missing messages": Check message counter for gaps in sequence
  - "Time synchronization issues": Verify system time (NTP) across ECUs

tools_required:
  - dlt-daemon (optional, for network logging)
  - DLT Viewer (optional, for visualization)
  - Python 3.8+

references:
  - AUTOSAR DLT Protocol Specification v1.0
  - COVESA DLT Viewer: https://github.com/COVESA/dlt-viewer
  - DLT Daemon: https://github.com/COVESA/dlt-daemon
