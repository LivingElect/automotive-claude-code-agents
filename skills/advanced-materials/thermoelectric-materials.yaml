description: Expert skill in thermoelectric generator (TEG) design for automotive waste heat recovery from exhaust and coolant systems.
use_cases:
- Exhaust waste heat recovery for auxiliary power generation
- Radiator coolant temperature gradient energy harvesting
- Seat climate control (heating/cooling via Peltier effect)
- Battery thermal management (active cooling/heating)
