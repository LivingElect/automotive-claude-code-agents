  ## Sensor Reliability Weighting

  ### Adaptive Fusion Based on Sensor Confidence

  ```cpp
  class AdaptiveFusion {
  public:
      FusedObject fuse(const std::vector<SensorObject>& sensor_objects) {
          FusedObject result;

          // Calculate reliability weights for each sensor
          std::vector<double> weights;
          double weight_sum = 0.0;

          for (const auto& obj : sensor_objects) {
              double w = calculateReliability(obj);
              weights.push_back(w);
              weight_sum += w;
          }

          // Normalize weights
          for (auto& w : weights) {
              w /= weight_sum;
          }

          // Weighted fusion of position
          Eigen::Vector2d fused_pos = Eigen::Vector2d::Zero();
          for (size_t i = 0; i < sensor_objects.size(); ++i) {
              fused_pos += weights[i] * sensor_objects[i].position;
          }
          result.position = fused_pos;

          // Weighted fusion of velocity
          Eigen::Vector2d fused_vel = Eigen::Vector2d::Zero();
          for (size_t i = 0; i < sensor_objects.size(); ++i) {
              fused_vel += weights[i] * sensor_objects[i].velocity;
          }
          result.velocity = fused_vel;

          // Covariance intersection for uncertainty
          result.covariance = covarianceIntersection(sensor_objects, weights);

          return result;
      }

  private:
      double calculateReliability(const SensorObject& obj) {
          double w = 1.0;

          // Factor 1: Detection confidence
          w *= obj.detection_confidence;

          // Factor 2: Environmental conditions
          w *= getWeatherDegradationFactor(obj.sensor_type);

          // Factor 3: Sensor health status
          w *= obj.sensor_health;

          // Factor 4: Measurement uncertainty
          double uncertainty = obj.covariance.trace();
          w *= exp(-uncertainty / 10.0);  // Exponential decay

          // Factor 5: Historical reliability
          w *= obj.sensor_historical_reliability;

          return w;
      }

      double getWeatherDegradationFactor(SensorType type) {
          // Environmental conditions from vehicle sensors
          double visibility = environment_.visibility_km;
          double rain_intensity = environment_.rain_mm_per_hour;
          bool fog = environment_.fog_detected;

          switch (type) {
              case SensorType::CAMERA:
                  if (fog) return 0.3;
                  if (rain_intensity > 10.0) return 0.5;
                  return 1.0;

              case SensorType::LIDAR:
                  if (rain_intensity > 20.0) return 0.4;
                  if (fog) return 0.2;
                  return 1.0;

              case SensorType::RADAR:
                  // Radar relatively immune to weather
                  return 0.95;

              case SensorType::ULTRASONIC:
                  return 1.0;  // Short range, weather independent

              default:
                  return 1.0;
          }
      }
  };
  ```

  ## SOTIF Validation (ISO 21448)

  ### Scenario-Based Testing for Sensor Fusion

  ```python
  class SensorFusionSOTIFValidator:
      """
      Validate sensor fusion system per ISO 21448
      """
      def __init__(self):
          self.test_scenarios = self.load_critical_scenarios()

      def load_critical_scenarios(self):
          """
          Define critical scenarios for sensor fusion validation
          """
          return [
              # Lighting conditions
              {"name": "Low sun", "sun_angle": 5, "glare": True},
              {"name": "Night", "illumination": 0.01},
              {"name": "Tunnel transition", "lighting_change_rate": 1000},

              # Weather
              {"name": "Heavy rain", "rain_rate": 50},
              {"name": "Snow", "visibility": 50},
              {"name": "Fog", "visibility": 20},

              # Sensor degradation
              {"name": "Dirty camera", "camera_occlusion": 0.3},
              {"name": "Radar interference", "interference_level": 0.5},
              {"name": "Lidar rain degradation", "point_cloud_density": 0.3},

              # Complex scenarios
              {"name": "Cut-in at twilight in rain", "combined": True},
              {"name": "Stationary vehicle in fog", "combined": True},

              # Edge cases
              {"name": "Bicycle occlusion", "object_size": "small"},
              {"name": "Black vehicle at night", "contrast": 0.05},
          ]

      def validate_scenario(self, scenario):
          """
          Run fusion system through scenario and assess performance
          """
          # Setup simulation environment
          sim = Simulator()
          sim.configure_scenario(scenario)

          # Initialize fusion system
          fusion = SensorFusionSystem()

          # Run scenario
          results = []
          for timestep in sim.run():
              # Get sensor inputs (degraded per scenario)
              sensor_data = sim.get_sensor_data()

              # Run fusion
              fused_objects = fusion.process(sensor_data)

              # Evaluate against ground truth
              metrics = self.evaluate_performance(
                  fused_objects,
                  sim.ground_truth_objects
              )
              results.append(metrics)

          # Assess SOTIF compliance
          return self.assess_sotif_compliance(results)
  ```

  ## Safety Architecture (ASIL D)

  ### Redundant Fusion with Voting

  ```cpp
  // ASIL D sensor fusion with redundancy and voting
  class SafeSensorFusion {
  public:
      FusedObjectList process(const SensorInputs& inputs) {
          // Run two independent fusion algorithms
          auto result_ekf = fusion_ekf_.process(inputs);
          auto result_ukf = fusion_ukf_.process(inputs);

          // Compare results (plausibility check)
          if (compare(result_ekf, result_ukf)) {
              // Agreement -> use primary result
              return result_ekf;
          } else {
              // Disagreement -> enter safe state
              safety_monitor_.trigger_degraded_mode();

              // Use most conservative result
              return selectConservative(result_ekf, result_ukf);
          }
      }

  private:
      EKFFusion fusion_ekf_;   // QM (Quality Managed)
      UKFFusion fusion_ukf_;   // QM (Quality Managed)
      SafetyMonitor safety_monitor_;  // ASIL D

      bool compare(const FusedObjectList& a, const FusedObjectList& b) {
          // Check if results agree within tolerance
          const double POS_TOLERANCE = 0.5;  // 0.5m
          const double VEL_TOLERANCE = 1.0;  // 1.0 m/s

          // Data association between lists
          auto associations = associateObjects(a, b);

          for (const auto& [obj_a, obj_b] : associations) {
              double pos_diff = (obj_a.position - obj_b.position).norm();
              double vel_diff = (obj_a.velocity - obj_b.velocity).norm();

              if (pos_diff > POS_TOLERANCE || vel_diff > VEL_TOLERANCE) {
                  return false;  // Disagreement detected
              }
          }

          return true;  // Results agree
      }
  };
  ```

