  ## Kalman Filter Implementation

  ### Extended Kalman Filter (EKF) for Object Tracking

  ```cpp
  class ObjectTracker {
  public:
      // State vector: [x, y, vx, vy] - position and velocity
      Eigen::Vector4d state_;
      Eigen::Matrix4d covariance_;

      void predict(double dt) {
          // State transition matrix (constant velocity model)
          Eigen::Matrix4d F;
          F << 1, 0, dt, 0,
               0, 1, 0,  dt,
               0, 0, 1,  0,
               0, 0, 0,  1;

          // Process noise covariance
          Eigen::Matrix4d Q = calculateProcessNoise(dt);

          // Prediction step
          state_ = F * state_;
          covariance_ = F * covariance_ * F.transpose() + Q;
      }

      void updateRadar(const RadarMeasurement& z) {
          // Measurement model: radar provides range, range_rate, azimuth
          Eigen::Vector3d predicted_z = h_radar(state_);

          // Measurement Jacobian
          Eigen::Matrix<double, 3, 4> H = computeRadarJacobian(state_);

          // Measurement noise covariance
          Eigen::Matrix3d R = radar_noise_covariance_;

          // Innovation
          Eigen::Vector3d y = z.vector() - predicted_z;

          // Innovation covariance
          Eigen::Matrix3d S = H * covariance_ * H.transpose() + R;

          // Kalman gain
          Eigen::Matrix<double, 4, 3> K = covariance_ * H.transpose() * S.inverse();

          // Update step
          state_ = state_ + K * y;
          covariance_ = (Eigen::Matrix4d::Identity() - K * H) * covariance_;
      }

      void updateCamera(const CameraMeasurement& z) {
          // Camera provides pixel coordinates (u, v)
          // Need camera calibration for pixel-to-world mapping
          Eigen::Vector2d predicted_z = h_camera(state_);

          // Similar update process as radar
          // [Implementation details...]
      }

      void updateLidar(const LidarMeasurement& z) {
          // Lidar provides 3D point cloud
          // Measurement model: closest point to tracked object
          Eigen::Vector3d predicted_z = h_lidar(state_);

          // Similar update process
          // [Implementation details...]
      }

  private:
      Eigen::Matrix4d calculateProcessNoise(double dt) {
          double noise_ax = 2.0;  // Acceleration noise [m/sВІ]
          double noise_ay = 2.0;

          Eigen::Matrix4d Q;
          Q << dt*dt*dt*dt/4 * noise_ax, 0, dt*dt*dt/2 * noise_ax, 0,
               0, dt*dt*dt*dt/4 * noise_ay, 0, dt*dt*dt/2 * noise_ay,
               dt*dt*dt/2 * noise_ax, 0, dt*dt * noise_ax, 0,
               0, dt*dt*dt/2 * noise_ay, 0, dt*dt * noise_ay;

          return Q;
      }
  };
  ```

  ## Data Association

  ### Joint Probabilistic Data Association (JPDA)

  ```python
  def jpda_association(tracks, measurements, gate_threshold=9.21):
      """
      JPDA for multi-object tracking with clutter

      Args:
          tracks: List of existing tracks
          measurements: List of new sensor measurements
          gate_threshold: Chi-square gating threshold (9.21 for 99% @ 2D)

      Returns:
          Association probabilities for each track-measurement pair
      """
      n_tracks = len(tracks)
      n_measurements = len(measurements)

      # Validation matrix (which measurements are inside gate of each track)
      validation_matrix = np.zeros((n_tracks, n_measurements), dtype=bool)

      # Innovation likelihoods
      likelihoods = np.zeros((n_tracks, n_measurements))

      # Gate measurements for each track
      for i, track in enumerate(tracks):
          for j, meas in enumerate(measurements):
              # Innovation
              y = meas.z - track.predict_measurement()

              # Innovation covariance
              S = track.H @ track.P @ track.H.T + meas.R

              # Mahalanobis distance
              d = y.T @ np.linalg.inv(S) @ y

              if d < gate_threshold:
                  validation_matrix[i, j] = True
                  # Likelihood
                  likelihoods[i, j] = scipy.stats.multivariate_normal.pdf(
                      y, mean=np.zeros_like(y), cov=S
                  )

      # Calculate association probabilities
      # [Detailed JPDA probability calculation...]

      return association_probabilities
