  ### Build System (CMake for S32K344)

  ```cmake
  # CMakeLists.txt for Zone Controller Firmware
  cmake_minimum_required(VERSION 3.20)
  project(ZoneController C ASM)

  set(CMAKE_TOOLCHAIN_FILE "${CMAKE_SOURCE_DIR}/toolchain-s32k344.cmake")

  # Target microcontroller
  set(MCU S32K344)
  set(MCU_FAMILY S32K3)

  # AUTOSAR MCAL path
  set(MCAL_ROOT "${CMAKE_SOURCE_DIR}/../mcal/S32K3")

  # Include directories
  include_directories(
      ${CMAKE_SOURCE_DIR}/src
      ${CMAKE_SOURCE_DIR}/inc
      ${MCAL_ROOT}/include
  )

  # Source files
  file(GLOB_RECURSE APP_SOURCES "src/*.c")
  file(GLOB_RECURSE MCAL_SOURCES "${MCAL_ROOT}/src/*.c")

  # Create executable
  add_executable(${PROJECT_NAME}.elf
      ${APP_SOURCES}
      ${MCAL_SOURCES}
      startup_S32K344.s
  )

  # Linker script
  set_target_properties(${PROJECT_NAME}.elf PROPERTIES
      LINK_FLAGS "-T ${CMAKE_SOURCE_DIR}/linker/S32K344_flash.ld -Wl,-Map=${PROJECT_NAME}.map"
  )

  # Generate binary and hex files
  add_custom_command(TARGET ${PROJECT_NAME}.elf POST_BUILD
      COMMAND ${CMAKE_OBJCOPY} -O binary ${PROJECT_NAME}.elf ${PROJECT_NAME}.bin
      COMMAND ${CMAKE_OBJCOPY} -O ihex ${PROJECT_NAME}.elf ${PROJECT_NAME}.hex
      COMMENT "Generating binary and hex files"
  )

  # Print memory usage
  add_custom_command(TARGET ${PROJECT_NAME}.elf POST_BUILD
      COMMAND ${CMAKE_SIZE} ${PROJECT_NAME}.elf
      COMMENT "Firmware size:"
  )
  ```

  ### Deliverables

  When developing zone controller firmware, provide:
  1. Hardware requirements specification (BOM)
  2. Software architecture document (UML diagrams)
  3. AUTOSAR configuration (ARXML files)
  4. C source code with MISRA C compliance
  5. Build scripts (CMake/Makefile)
  6. Unit tests (GoogleTest or Unity)
  7. Integration test plan (HIL/SIL)
  8. Safety analysis (FMEA, FTA for ASIL-D)

constraints:
- MISRA C 2012 compliance (mandatory rules)
- ISO 26262 ASIL-D for safety-critical functions
- Real-time OS task scheduling < 10ms worst-case
- Memory usage < 80% of Flash and RAM
- CAN/LIN bus load < 60%
- Ethernet latency < 5ms p99
- Watchdog timeout < 100ms
tools_required:
- Compilers (GCC ARM, GreenHills MULTI, IAR Embedded Workbench)
- AUTOSAR toolchain (Vector DaVinci, EB tresos)
- Debuggers (Lauterbach TRACE32, SEGGER J-Link)
- Static analysis (Polyspace, Klocwork, Coverity)
- Unit test (GoogleTest, Unity, CppUTest)
- HIL simulator (dSPACE, ETAS, Vector CANoe)
