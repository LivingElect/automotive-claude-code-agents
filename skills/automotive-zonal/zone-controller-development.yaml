  ### Zone Controller Software Architecture

  ```
  ┌────────────────────────────────────────────────────┐
  │         Application Layer                          │
  │  ┌──────────┐  ┌──────────┐  ┌──────────┐        │
  │  │ Sensor   │  │ Actuator │  │ Gateway  │        │
  │  │ Manager  │  │ Control  │  │ Router   │        │
  │  └──────────┘  └──────────┘  └──────────┘        │
  ├────────────────────────────────────────────────────┤
  │         AUTOSAR Classic BSW / Adaptive Runtime     │
  │  ┌──────────┐  ┌──────────┐  ┌──────────┐        │
  │  │ Com      │  │ CanIf    │  │ EthIf    │        │
  │  │ Manager  │  │          │  │          │        │
  │  └──────────┘  └──────────┘  └──────────┘        │
  ├────────────────────────────────────────────────────┤
  │         MCAL (Microcontroller Abstraction Layer)   │
  │  ┌──────────┐  ┌──────────┐  ┌──────────┐        │
  │  │ CAN      │  │ ADC      │  │ PWM      │        │
  │  │ Driver   │  │ Driver   │  │ Driver   │        │
  │  └──────────┘  └──────────┘  └──────────┘        │
  └────────────────────────────────────────────────────┘
  ```

  ### I/O Handling

  **Digital Input Example (Door Switch)**

  ```c
  /* door_switch.c - Read door switch state with debouncing */
  #include "Dio.h"  /* AUTOSAR Digital I/O Driver */
  #include "Gpt.h"  /* General Purpose Timer */

  #define DOOR_SWITCH_PIN     DIO_CHANNEL_0
  #define DEBOUNCE_TIME_MS    50

  typedef enum {
      DOOR_CLOSED = 0,
      DOOR_OPEN = 1
  } DoorState_t;

  static DoorState_t current_state = DOOR_CLOSED;
  static uint32_t debounce_counter = 0;

  void DoorSwitch_Init(void) {
      /* Configure pin as input with pull-up */
      Dio_SetPinMode(DOOR_SWITCH_PIN, DIO_MODE_INPUT_PULLUP);
  }

  DoorState_t DoorSwitch_ReadState(void) {
      Dio_LevelType pin_level = Dio_ReadChannel(DOOR_SWITCH_PIN);
      static Dio_LevelType last_level = STD_HIGH;

      /* Debouncing logic */
      if (pin_level != last_level) {
          debounce_counter++;
          if (debounce_counter >= (DEBOUNCE_TIME_MS / 10)) {
              /* State changed for long enough */
              current_state = (pin_level == STD_LOW) ? DOOR_OPEN : DOOR_CLOSED;
              last_level = pin_level;
              debounce_counter = 0;
          }
      } else {
          debounce_counter = 0;
      }

      return current_state;
  }

  /* Called every 10ms by OS task */
  void DoorSwitch_MainFunction(void) {
      DoorState_t state = DoorSwitch_ReadState();

      if (state == DOOR_OPEN) {
          /* Publish event to network */
          SendDoorOpenEvent();
      }
  }
  ```

  **Analog Input Example (Temperature Sensor)**

  ```c
  /* temperature_sensor.c - Read NTC thermistor via ADC */
  #include "Adc.h"  /* AUTOSAR ADC Driver */
  #include <math.h>

  #define TEMP_ADC_CHANNEL    ADC_CHANNEL_5
  #define ADC_RESOLUTION      4096  /* 12-bit ADC */
  #define VREF_MV             3300  /* 3.3V reference */

  /* NTC thermistor parameters (e.g., Vishay NTCLE100E3) */
  #define R_REF_OHM           10000  /* Pull-up resistor */
  #define B_COEFFICIENT       3977   /* Beta coefficient */
  #define T0_KELVIN           298.15 /* 25°C in Kelvin */

  float TemperatureSensor_ReadCelsius(void) {
      /* Start ADC conversion */
      Adc_StartGroupConversion(ADC_GROUP_0);

      /* Wait for conversion complete */
      while (Adc_GetGroupStatus(ADC_GROUP_0) != ADC_COMPLETED);

      /* Read ADC value */
      Adc_ValueGroupType adc_value;
      Adc_ReadGroup(ADC_GROUP_0, &adc_value);

      /* Convert ADC value to voltage */
      float v_adc = (float)adc_value * VREF_MV / ADC_RESOLUTION;

      /* Calculate NTC resistance using voltage divider formula */
      float r_ntc = R_REF_OHM * v_adc / (VREF_MV - v_adc);

      /* Steinhart-Hart equation (simplified Beta formula) */
      float temp_kelvin = 1.0f / (
          (1.0f / T0_KELVIN) + (1.0f / B_COEFFICIENT) * logf(r_ntc / 10000.0f)
      );

      return temp_kelvin - 273.15f;  /* Convert to Celsius */
  }

  void TemperatureSensor_MainFunction(void) {
      float temp_c = TemperatureSensor_ReadCelsius();

      /* Publish to network every 1 second */
      static uint32_t publish_counter = 0;
      if (++publish_counter >= 100) {  /* 10ms task * 100 = 1s */
          SendTemperatureEvent(temp_c);
          publish_counter = 0;
      }
  }
  ```

  **PWM Output Example (LED Dimming)**

  ```c
  /* led_control.c - PWM-based LED brightness control */
  #include "Pwm.h"  /* AUTOSAR PWM Driver */

  #define LED_PWM_CHANNEL     PWM_CHANNEL_3
  #define PWM_FREQUENCY_HZ    1000  /* 1 kHz */
  #define PWM_PERIOD_TICKS    16000 /* Assuming 16 MHz clock */

  void LED_Init(void) {
      /* Initialize PWM channel */
      Pwm_Init(&Pwm_Config);
      Pwm_SetPeriodAndDuty(LED_PWM_CHANNEL, PWM_PERIOD_TICKS, 0);
  }

  void LED_SetBrightness(uint8_t percent) {
      /* Clamp to 0-100% */
      if (percent > 100) percent = 100;

      /* Calculate duty cycle (0-100% of period) */
      uint16_t duty_ticks = (uint32_t)PWM_PERIOD_TICKS * percent / 100;

      /* Set PWM duty cycle */
      Pwm_SetDutyCycle(LED_PWM_CHANNEL, duty_ticks);
  }

  void LED_FadeIn(uint16_t duration_ms) {
      for (uint8_t brightness = 0; brightness <= 100; brightness += 5) {
          LED_SetBrightness(brightness);
          Os_DelayMs(duration_ms / 20);  /* 20 steps */
      }
  }
  ```

  ### Sensor Aggregation

  **Multi-sensor Data Fusion (Wheel Speed Sensors)**

  ```c
  /* wheel_speed_aggregator.c - Aggregate 4 wheel speed sensors */
  #include "Can.h"
  #include "EthIf.h"

  typedef struct {
      uint16_t speed_rpm;      /* Wheel speed in RPM */
      uint8_t validity;        /* 0=invalid, 1=valid, 2=degraded */
      uint64_t timestamp_us;   /* Timestamp in microseconds */
  } WheelSpeed_t;

  static WheelSpeed_t wheel_speeds[4] = {0};  /* FL, FR, RL, RR */

  /* Called when CAN message received from wheel speed sensor */
  void WheelSpeed_OnCanMessage(uint8_t wheel_id, Can_MessageType* msg) {
      if (wheel_id >= 4) return;

      /* Parse CAN message (example format) */
      wheel_speeds[wheel_id].speed_rpm = (msg->data[0] << 8) | msg->data[1];
      wheel_speeds[wheel_id].validity = msg->data[2];
      wheel_speeds[wheel_id].timestamp_us = GetCurrentTimestampUs();
  }

  /* Aggregate and publish to Ethernet every 20ms */
  void WheelSpeed_MainFunction(void) {
      static uint32_t publish_counter = 0;

      if (++publish_counter >= 2) {  /* 10ms task * 2 = 20ms */
          /* Calculate vehicle speed (average of all 4 wheels) */
          uint32_t sum_rpm = 0;
          uint8_t valid_count = 0;

          for (uint8_t i = 0; i < 4; i++) {
              if (wheel_speeds[i].validity == 1) {
                  sum_rpm += wheel_speeds[i].speed_rpm;
                  valid_count++;
              }
          }

          if (valid_count >= 3) {  /* At least 3 valid sensors */
              uint16_t avg_rpm = sum_rpm / valid_count;
              float vehicle_speed_kmh = avg_rpm * WHEEL_CIRCUMFERENCE_M * 60.0f / 1000.0f;

              /* Publish to Ethernet (SOME/IP event) */
              PublishVehicleSpeedEvent(vehicle_speed_kmh, valid_count);
          } else {
              /* Publish invalid status */
              PublishVehicleSpeedEvent(0.0f, 0);
          }

          publish_counter = 0;
      }
  }
  ```

  ### Actuator Control with Safety

  **Motor Control (Window Lift)**

  ```c
  /* window_motor_control.c - Window motor with anti-pinch safety */
  #include "Pwm.h"
  #include "Adc.h"
  #include "Dio.h"

  #define MOTOR_PWM_CHANNEL       PWM_CHANNEL_5
  #define MOTOR_DIR_PIN           DIO_CHANNEL_10
  #define MOTOR_CURRENT_ADC       ADC_CHANNEL_8

  #define MAX_CURRENT_MA          5000  /* 5A max */
  #define ANTIPINCH_THRESHOLD_MA  3000  /* 3A triggers anti-pinch */

  typedef enum {
      MOTOR_STOP = 0,
      MOTOR_UP = 1,
      MOTOR_DOWN = 2
  } MotorDirection_t;

  static MotorDirection_t current_direction = MOTOR_STOP;

  void WindowMotor_Init(void) {
      Pwm_Init(&Pwm_Config);
      Dio_SetPinMode(MOTOR_DIR_PIN, DIO_MODE_OUTPUT);
  }

  void WindowMotor_Move(MotorDirection_t direction, uint8_t speed_percent) {
      current_direction = direction;

      /* Set direction pin */
      if (direction == MOTOR_UP) {
          Dio_WriteChannel(MOTOR_DIR_PIN, STD_HIGH);
      } else if (direction == MOTOR_DOWN) {
          Dio_WriteChannel(MOTOR_DIR_PIN, STD_LOW);
      }

      /* Set PWM speed */
      if (direction == MOTOR_STOP) {
          Pwm_SetDutyCycle(MOTOR_PWM_CHANNEL, 0);
      } else {
          uint16_t duty = (uint32_t)PWM_PERIOD_TICKS * speed_percent / 100;
          Pwm_SetDutyCycle(MOTOR_PWM_CHANNEL, duty);
      }
  }

  void WindowMotor_SafetyCheck(void) {
      /* Read motor current via ADC */
      Adc_StartGroupConversion(ADC_GROUP_1);
      while (Adc_GetGroupStatus(ADC_GROUP_1) != ADC_COMPLETED);

      Adc_ValueGroupType adc_value;
      Adc_ReadGroup(ADC_GROUP_1, &adc_value);

      /* Convert ADC to current (example: 1mV = 1mA via shunt resistor) */
      uint16_t current_ma = adc_value * VREF_MV / ADC_RESOLUTION;

      /* Anti-pinch detection */
      if (current_ma > ANTIPINCH_THRESHOLD_MA && current_direction == MOTOR_UP) {
          /* Stop motor immediately */
          WindowMotor_Move(MOTOR_STOP, 0);

          /* Reverse slightly to release pinch */
          WindowMotor_Move(MOTOR_DOWN, 50);
          Os_DelayMs(500);
          WindowMotor_Move(MOTOR_STOP, 0);

          /* Report safety event */
          ReportAntiPinchEvent();
      }

      /* Overcurrent protection */
      if (current_ma > MAX_CURRENT_MA) {
          WindowMotor_Move(MOTOR_STOP, 0);
          ReportOvercurrentFault(current_ma);
      }
  }
  ```

  ### Gateway Function (CAN to Ethernet)

  ```c
  /* can_eth_gateway.c - Route CAN messages to Ethernet (SOME/IP) */
  #include "CanIf.h"
  #include "EthIf.h"
  #include "SomeIp.h"

  /* CAN message ID mapping to SOME/IP events */
  typedef struct {
      uint32_t can_id;
      uint16_t someip_service_id;
      uint16_t someip_event_id;
  } CanToSomeIpMapping_t;

  static const CanToSomeIpMapping_t routing_table[] = {
      {0x100, 0x1234, 0x8001},  /* VehicleSpeed CAN → SOME/IP */
      {0x200, 0x1235, 0x8002},  /* BrakeStatus CAN → SOME/IP */
      {0x300, 0x1236, 0x8003},  /* DoorStatus CAN → SOME/IP */
      /* ... more mappings */
  };

  void Gateway_OnCanRx(Can_IdType can_id, const uint8_t* data, uint8_t dlc) {
      /* Find matching routing entry */
      for (uint8_t i = 0; i < ARRAY_SIZE(routing_table); i++) {
          if (routing_table[i].can_id == can_id) {
              /* Convert CAN payload to SOME/IP format */
              uint8_t someip_payload[128];
              uint16_t payload_len = ConvertCanToSomeIp(data, dlc, someip_payload);

              /* Publish SOME/IP event */
              SomeIp_PublishEvent(
                  routing_table[i].someip_service_id,
                  routing_table[i].someip_event_id,
                  someip_payload,
                  payload_len
              );

              break;
          }
      }
  }

  /* Reverse direction: SOME/IP to CAN */
  void Gateway_OnSomeIpRx(uint16_t service_id, uint16_t method_id, const uint8_t* data, uint16_t len) {
      /* Example: Headlight control command from central compute */
      if (service_id == 0x5000 && method_id == 0x0001) {
          /* Parse SOME/IP payload */
          uint8_t headlight_state = data[0];  /* 0=off, 1=on, 2=high beam */

          /* Convert to CAN message */
          Can_MessageType can_msg;
          can_msg.id = 0x400;
          can_msg.dlc = 1;
          can_msg.data[0] = headlight_state;

          /* Transmit on CAN bus */
          CanIf_Transmit(CAN_CHANNEL_0, &can_msg);
      }
  }
  ```

