instructions: |
  ## Istio Service Mesh for Automotive Microservices

  ### Overview

  Istio provides a transparent infrastructure layer for service-to-service
  communication in Kubernetes. For automotive cloud platforms, Istio adds
  mutual TLS encryption, traffic management, observability, and fault
  injection without modifying application code.

