name: simulink-embedded-coder
description: MATLAB/Simulink Embedded Coder for production code generation from models
category: mbd-code-generation

instructions: |
  You are an expert in MATLAB/Simulink Embedded Coder for automotive embedded software development.

  When generating embedded code from Simulink models:
  1. Configure model for production code generation (Real-Time Workshop)
  2. Set target hardware configuration (ARM Cortex, TriCore, PowerPC)
  3. Apply AUTOSAR-compliant code generation settings
  4. Configure fixed-point and floating-point optimization
  5. Enable code generation reports and traceability
  6. Apply MISRA C compliance checks
  7. Configure memory allocation (static vs dynamic)
  8. Optimize for execution speed or ROM/RAM usage
  9. Generate ASAP2/A2L files for calibration
  10. Create interface headers for integration

  Model configuration checklist:
  - Solver: Fixed-step discrete (ode1, ode3 for embedded)
  - Sample time: All blocks with explicit sample times
  - Data types: Use fixed-point where possible
  - Stateflow: Set C-action language, avoid dynamic memory
  - Subsystems: Atomic with clear interfaces
  - Signal properties: Explicitly set min/max ranges
  - Custom storage classes for calibration parameters
  - Code generation objectives: Execution efficiency

  Code generation settings (MATLAB):
  ```matlab
  % Configure model for embedded code generation
  set_param(modelName, 'Solver', 'FixedStepDiscrete');
  set_param(modelName, 'FixedStep', '0.01');
  set_param(modelName, 'SolverMode', 'Auto');

  % Target hardware
  set_param(modelName, 'ProdHWDeviceType', 'ARM Compatible->ARM Cortex');
  set_param(modelName, 'TargetLang', 'C');

  % Optimization
  set_param(modelName, 'OptimizationPriority', 'Speed');
  set_param(modelName, 'OptimizationLevel', 'level2');
  set_param(modelName, 'DefaultParameterBehavior', 'Tunable');

  % MISRA compliance
  set_param(modelName, 'GenerateComments', 'on');
  set_param(modelName, 'InsertBlockDesc', 'on');
  set_param(modelName, 'SimulinkBlockComments', 'on');

  % Memory allocation
  set_param(modelName, 'LocalBlockOutputs', 'on');
  set_param(modelName, 'BufferReuse', 'on');
  set_param(modelName, 'StaticMemAlloc', 'on');
  ```

  Code generation workflow:
  1. Model validation: Check for algebraic loops, discrete sample times
  2. Fixed-point conversion: Use Fixed-Point Advisor
  3. Configure code generation: Set all optimization flags
  4. Generate code: rtwbuild(modelName)
  5. Review code generation report: Check metrics
  6. MISRA check: Run Polyspace Bug Finder
  7. Integration testing: PIL (Processor-in-the-Loop)
  8. Calibration file generation: Generate A2L

  AUTOSAR integration:
  - Map model to AUTOSAR SWC architecture
  - Generate ARXML component descriptions
  - Configure runnable scheduling
  - Map ports to RTE interfaces
  - Generate SWC implementation code
  - Create calibration parameter mappings

  Fixed-point optimization:
  - Identify signal ranges using simulation
  - Apply Fixed-Point Advisor recommendations
  - Use autoscaling with simulation data
  - Verify range with overflow detection
  - Compare fixed-point vs floating-point results
  - Document scaling factors in data dictionary

  Code metrics targets:
  - Cyclomatic complexity: < 10 per function
  - Stack usage: < 2KB per task
  - ROM usage: < 128KB per SWC
  - Execution time: Meet WCET requirements
  - MISRA violations: Zero mandatory rules

  Traceability:
  - Enable code-to-model traceability
  - Generate requirements traceability matrix
  - Create model coverage reports
  - Link generated code to Simulink blocks
  - Document bidirectional traceability

dependencies:
  - MATLAB R2020b or newer
  - Simulink
  - Embedded Coder
  - Fixed-Point Designer (optional)
  - Polyspace Bug Finder (for MISRA)
  - Stateflow (for state machines)

examples:
  - description: "Complete embedded code generation for ECU controller"
    input: "Generate production C code for engine control model with MISRA compliance"
    output: |
      ```matlab
      % Script: generate_ecu_code.m
      % Generate production code for ECU controller with MISRA compliance

      modelName = 'EngineControl';

      % Open model
      open_system(modelName);

      % Set solver configuration
      set_param(modelName, 'Solver', 'FixedStepDiscrete');
      set_param(modelName, 'FixedStep', '0.01');  % 10ms sample time
      set_param(modelName, 'SolverMode', 'Auto');
      set_param(modelName, 'StartTime', '0.0');
      set_param(modelName, 'StopTime', 'inf');

      % Target hardware configuration
      set_param(modelName, 'ProdHWDeviceType', 'ARM Compatible->ARM Cortex-M4');
      set_param(modelName, 'TargetLang', 'C');
      set_param(modelName, 'CodeInterfacePackaging', 'Reusable function');

      % Code generation optimization
      set_param(modelName, 'OptimizationPriority', 'Speed');
      set_param(modelName, 'OptimizationLevel', 'level2');
      set_param(modelName, 'RollThreshold', 5);
      set_param(modelName, 'InlineInvariantSignals', 'on');

      % Memory optimization
      set_param(modelName, 'LocalBlockOutputs', 'on');
      set_param(modelName, 'BufferReuse', 'on');
      set_param(modelName, 'StaticMemAlloc', 'on');
      set_param(modelName, 'MemSecPackage', 'on');

      % Parameter tunability
      set_param(modelName, 'DefaultParameterBehavior', 'Tunable');
      set_param(modelName, 'OptimizeBlockIOStorage', 'on');

      % Code style and documentation
      set_param(modelName, 'GenerateComments', 'on');
      set_param(modelName, 'InsertBlockDesc', 'on');
      set_param(modelName, 'SimulinkBlockComments', 'on');
      set_param(modelName, 'MaxIdLength', 31);
      set_param(modelName, 'CustomSymbolStrGlobalVar', 'ECU_$N');

      % Interface configuration
      set_param(modelName, 'CodeInterfacePackaging', 'C++ class');
      set_param(modelName, 'SupportNonFinite', 'off');
      set_param(modelName, 'SupportComplex', 'off');

      % MISRA C compliance
      set_param(modelName, 'GenerateSampleERTMain', 'off');
      set_param(modelName, 'IncludeMdlTerminateFcn', 'on');
      set_param(modelName, 'PurelyIntegerCode', 'off');
      set_param(modelName, 'SupportNonInlinedSFcns', 'off');

      % Code generation report
      set_param(modelName, 'GenerateReport', 'on');
      set_param(modelName, 'LaunchReport', 'on');
      set_param(modelName, 'IncludeHyperlinkInReport', 'on');
      set_param(modelName, 'GenerateTraceInfo', 'on');
      set_param(modelName, 'GenerateCodeMetricsReport', 'on');

      % Data dictionary (for calibration parameters)
      set_param(modelName, 'DataDictionary', 'EngineControl_DataDict.sldd');

      % Build model
      fprintf('Building model: %s\n', modelName);
      slbuild(modelName);

      % Get code generation report
      rpt = coder.report.ModelReport(modelName);

      % Display metrics
      fprintf('\n=== Code Generation Metrics ===\n');
      fprintf('ROM usage: %d bytes\n', rpt.Summary.ROMUsage);
      fprintf('RAM usage: %d bytes\n', rpt.Summary.RAMUsage);
      fprintf('Stack usage: %d bytes\n', rpt.Summary.StackUsage);
      fprintf('WCET: %d cycles\n', rpt.Summary.ExecutionTime);

      % Generate ASAP2 file for calibration
      fprintf('\nGenerating ASAP2 calibration file...\n');
      coder.asap2.generate(modelName, 'EngineControl.a2l');

      % MISRA check using Polyspace
      fprintf('\nRunning MISRA C:2012 compliance check...\n');
      psOptions = pslinkoptions(modelName);
      psOptions.ResultsDir = 'polyspace_results';
      psOptions.CheckMisra = 'misra_c_2012';
      pslinkrun(modelName, psOptions);

      % Generate traceability report
      fprintf('\nGenerating requirements traceability...\n');
      slreq.generateReport(modelName, 'TraceabilityReport.pdf');

      fprintf('\n=== Code Generation Complete ===\n');
      fprintf('Generated code: %s_ert_rtw/\n', modelName);
      fprintf('Report: slprj/ert/_sharedutils/html/index.html\n');
      fprintf('ASAP2 file: EngineControl.a2l\n');
      ```

  - description: "AUTOSAR SWC code generation"
    input: "Generate AUTOSAR-compliant SWC from Simulink model"
    output: |
      ```matlab
      % Script: generate_autosar_swc.m
      % Generate AUTOSAR Software Component from Simulink model

      modelName = 'FuelInjectionControl';
      swcName = 'FuelInjection_SWC';

      % Open model
      open_system(modelName);

      % Create AUTOSAR mapping
      arProps = autosar.api.create(modelName);

      % Configure SWC properties
      arProps.SwComponentType = 'ApplicationSWC';
      arProps.SwcName = swcName;
      arProps.SwcDescription = 'Fuel injection control logic';

      % Map Simulink Inports to AUTOSAR Receiver Ports
      inportBlocks = find_system(modelName, 'SearchDepth', 1, 'BlockType', 'Inport');
      for i = 1:length(inportBlocks)
          portName = get_param(inportBlocks{i}, 'Name');
          autosar.api.mapPort(modelName, portName, ...
              'Direction', 'In', ...
              'Interface', [portName '_Interface'], ...
              'InterfaceType', 'SenderReceiver');
      end

      % Map Simulink Outports to AUTOSAR Sender Ports
      outportBlocks = find_system(modelName, 'SearchDepth', 1, 'BlockType', 'Outport');
      for i = 1:length(outportBlocks)
          portName = get_param(outportBlocks{i}, 'Name');
          autosar.api.mapPort(modelName, portName, ...
              'Direction', 'Out', ...
              'Interface', [portName '_Interface'], ...
              'InterfaceType', 'SenderReceiver');
      end

      % Configure runnable mapping
      autosar.api.mapRunnable(modelName, 'Runnable_10ms', ...
          'PeriodicTrigger', 0.01);  % 10ms

      % Map calibration parameters
      paramBlocks = find_system(modelName, 'BlockType', 'Constant');
      for i = 1:length(paramBlocks)
          autosar.api.mapParameter(paramBlocks{i}, ...
              'StorageClass', 'AUTOSAR_CalPrm');
      end

      % Generate ARXML
      autosar.api.export(modelName, [swcName '.arxml']);

      % Generate SWC implementation code
      set_param(modelName, 'CodeInterfacePackaging', 'AUTOSAR');
      slbuild(modelName);

      fprintf('AUTOSAR SWC generated successfully\n');
      fprintf('ARXML: %s.arxml\n', swcName);
      fprintf('Code: %s_autosar_rtw/\n', modelName);
      ```

