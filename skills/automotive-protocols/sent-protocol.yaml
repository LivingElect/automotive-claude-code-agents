description: Expert skill in SENT (Single Edge Nibble Transmission) protocol for automotive sensor-to-ECU communication with minimal wiring.
use_cases:
- Temperature sensor interfaces
- Pressure sensors (intake, exhaust, tire)
- Position sensors (throttle, pedal, steering angle)
