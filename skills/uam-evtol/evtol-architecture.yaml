description: >
  Comprehensive skill for designing and analyzing eVTOL (electric Vertical
  Take-Off and Landing) vehicle systems architecture, covering propulsion
  layouts, structural design, avionics integration, redundancy strategies,
  and system-level trade studies for urban air mobility platforms.
