  50 kWe    70 kWth
  (canteen  (hot water
  electricity) heating)
  ```


  ## Best Practices

  - Exhaust waste hierarchy options before resorting to energy recovery
  - Characterize waste calorific value and contaminants before selecting WtE technology
  - Prefer cement co-processing for paint sludge -- highest efficiency, lowest cost
  - Install RTO heat recovery as first priority -- it is always cost-effective
  - Size biogas systems conservatively -- organic waste volumes fluctuate seasonally
  - Obtain emissions permits early -- air quality permits can take 6-12 months
  - Monitor waste stream consistency -- varying composition affects WtE efficiency
  - Track zero-waste-to-landfill metrics monthly with clear diversion rate targets


  ## Common Patterns

  ### Zero Waste to Landfill Pathway

  ```
  Current state:          Target state:
  =============           =============
  30% recycled     -->    65% recycled (improved sorting)
  10% recovered    -->    30% recovered (WtE for residuals)
  60% landfill     -->    5% landfill (hazardous only, if any)
                          0% = certified zero-waste-to-landfill
  ```

  ### Energy Recovery Integration with Plant EMS

  ```
  Waste Heat (RTO)  -->  Building heating (winter) / Absorption chiller (summer)
  Biogas CHP        -->  Baseload electricity + canteen hot water
  Pyrolysis oil     -->  Emergency generator fuel / Boiler backup
  All sources       -->  ISO 50001 Energy Management System dashboard
  ```


  ## Troubleshooting

  - **Paint sludge too wet for pyrolysis**: Install belt dryer using RTO waste heat
  - **Biogas production low**: Check pH, temperature, and C:N ratio in digester
  - **Emissions from on-site WtE exceed permits**: Upgrade flue gas treatment, add scrubbers
  - **Cement kiln rejects waste**: Ensure chlorine content < 1%, heavy metals within limits
  - **RTO heat recovery fouling**: Install automated cleaning system, check filter upstream
  - **Waste stream volume insufficient for economic WtE**: Aggregate waste from nearby plants

constraints:
- Environmental permits required for on-site thermal treatment
- Waste composition variability affects WtE process stability
- Capital investment for gasification/pyrolysis requires 3-7 year payback
- Cement co-processing depends on proximity to cement plant
