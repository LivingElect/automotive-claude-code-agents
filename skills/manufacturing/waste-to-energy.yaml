  ### Step 3: RTO Waste Heat Recovery System

  ```python
  # RTO heat recovery optimization
  class RTOHeatRecovery:
      def __init__(self, rto_exhaust_temp_c: float, rto_flow_m3h: float):
          self.exhaust_temp = rto_exhaust_temp_c
          self.flow_rate = rto_flow_m3h

      def design_recovery_system(self, heat_sinks: list) -> dict:
          """Design heat recovery network from RTO exhaust."""
          available_heat_kw = self.calc_available_heat()
          allocated = []
          remaining_kw = available_heat_kw
          for sink in sorted(heat_sinks, key=lambda s: s["temperature_c"], reverse=True):
              if remaining_kw <= 0:
                  break
              recoverable = min(remaining_kw, sink["demand_kw"])
              allocated.append({
                  "sink": sink["name"],
                  "recovered_kw": recoverable,
                  "supply_temp_c": max(sink["temperature_c"] + 10, 60),
              })
              remaining_kw -= recoverable
          return {
              "available_heat_kw": round(available_heat_kw, 0),
              "recovered_kw": round(available_heat_kw - remaining_kw, 0),
              "recovery_pct": round((1 - remaining_kw / available_heat_kw) * 100, 1),
              "allocations": allocated,
              "annual_gas_savings_mwh": round((available_heat_kw - remaining_kw) * 8000 / 1000, 0),
          }

      def calc_available_heat(self) -> float:
          """Calculate recoverable heat from RTO exhaust."""
          air_density = 1.2  # kg/m3
          cp = 1.005  # kJ/kg.K
          delta_t = self.exhaust_temp - 80  # cool to 80C minimum
          return air_density * (self.flow_rate / 3600) * cp * delta_t
  ```

