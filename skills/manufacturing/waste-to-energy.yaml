instructions: |

  ## Overview

  Automotive manufacturing plants generate 15-30 kg of non-recyclable waste per vehicle
  produced, including paint sludge, contaminated absorbents, mixed plastics, and composite
  materials that cannot be mechanically recycled. Waste-to-energy (WtE) systems convert
  this residual waste into usable thermal or electrical energy, eliminating landfill
  dependency while recovering embedded energy value.

  This skill covers the full WtE technology spectrum from simple waste heat recovery through
  advanced gasification and pyrolysis, helping plants achieve zero-waste-to-landfill status
  while reducing overall energy cost and carbon footprint.


  ## Key Concepts

  ### Waste Hierarchy Applied to Automotive

  ```
  Priority 1: Prevention   (reduce paint overspray, lean material usage)
  Priority 2: Reuse        (regrind plastics, recirculate solvents)
  Priority 3: Recycling    (sort metals, recover chemicals)
  Priority 4: Recovery     (waste-to-energy for non-recyclables) <-- THIS SKILL
  Priority 5: Disposal     (landfill -- target: ZERO)
  ```

  ### Automotive Waste Streams for Energy Recovery

  - **Paint sludge**: 3-8 kg/vehicle, 15-20 MJ/kg calorific value (wet basis)
  - **RTO exhaust heat**: 200-350C, recoverable for building or process heating
  - **Contaminated plastics**: 2-4 kg/vehicle, 25-35 MJ/kg calorific value
  - **Used absorbents/rags**: 1-2 kg/vehicle, 18-22 MJ/kg
  - **Organic/canteen waste**: 0.5-1 kg/employee/day, biogas potential 100 m3/ton
  - **Solvent waste**: 0.5-1 kg/vehicle, 25-30 MJ/kg (prefer recovery over energy)

  ### WtE Technology Comparison

  ```
  Technology        Feedstock              Output          Efficiency  Scale
  ==============    ===================   ==============  =========   ======
  Incineration      Mixed waste            Heat + power    25-35%      Large
  Gasification      Dry waste, plastics    Syngas + heat   60-75%      Medium
  Pyrolysis         Plastics, sludge       Oil + char      50-70%      Medium
  Anaerobic digest  Organic waste          Biogas (CH4)    40-60%      Small
  Cement co-process Paint sludge, mixed    Heat (kiln)     85-95%      N/A
  RTO heat recovery VOC exhaust            Hot air/water   85-95%      In-plant
  ```


  ## Implementation Guide

  ### Step 1: Waste Energy Potential Assessment

  ```python
  # Calculate energy recovery potential from plant waste streams
  class WasteEnergyCalculator:
      def __init__(self, annual_production: int, employee_count: int):
          self.production = annual_production
          self.employees = employee_count

      def assess_streams(self, waste_data: list) -> dict:
          """Calculate total energy recovery potential."""
          total_energy_mwh = 0
          streams = []
          for waste in waste_data:
              annual_tons = waste["kg_per_vehicle"] * self.production / 1000
              energy_gj = annual_tons * waste["calorific_value_mj_per_kg"]
              energy_mwh = energy_gj / 3.6
              recovery_mwh = energy_mwh * waste["recovery_efficiency"]
              streams.append({
                  "stream": waste["name"],
                  "annual_tons": round(annual_tons, 1),
                  "energy_content_mwh": round(energy_mwh, 0),
                  "recoverable_mwh": round(recovery_mwh, 0),
                  "recommended_technology": waste["best_technology"],
              })
              total_energy_mwh += recovery_mwh
          return {
              "total_recoverable_mwh": round(total_energy_mwh, 0),
              "pct_of_plant_consumption": round(total_energy_mwh / (self.production * 1.0) * 100, 1),
              "streams": streams,
          }
  ```

