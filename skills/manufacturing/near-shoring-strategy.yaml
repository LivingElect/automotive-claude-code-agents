instructions: |

  ## Overview

  Near-shoring relocates manufacturing and sourcing from distant low-cost countries to
  geographically closer regions, trading labor cost advantage for reduced lead times,
  lower logistics cost, better IP protection, and reduced geopolitical risk. For automotive,
  this means shifting from Asia-centric supply chains toward regional production networks
  aligned with final assembly locations.

  The automotive industry faces compounding near-shoring drivers: USMCA regional content
  requirements (75% for passenger vehicles), EU battery regulation mandating local production,
  semiconductor reshoring incentives (CHIPS Act, EU Chips Act), and carbon border taxes
  penalizing long-distance transport of heavy components.


  ## Key Concepts

  ### Total Cost of Ownership (TCO) Components

  - **Unit cost**: Raw material + labor + overhead + margin
  - **Logistics**: Ocean freight, inland transport, customs brokerage, insurance
  - **Inventory**: Pipeline stock (weeks in transit), safety stock, warehousing
  - **Quality**: Incoming inspection, rejection rate, warranty claims, audit travel
  - **Risk**: Disruption probability x production downtime cost
  - **Tariffs/Duties**: Applied rate based on HS code and trade agreement eligibility
  - **Carbon cost**: Transport emissions x carbon price (EU ETS, CBAM)
  - **Working capital**: Payment terms, currency hedging, letter of credit costs

  ### Regional Content Requirements

  ```
  USMCA (North America):
    Vehicle:     75% regional value content
    Core parts:  75% (engine, transmission, body, chassis)
    Steel/Aluminum: 70% North American sourced
    Labor:       LVC (Labor Value Content) 40-45% at $16+/hr

  EU Battery Regulation:
    2027: Carbon footprint declaration mandatory
    2028: Maximum carbon footprint thresholds
    2030: Recycled content minimums (Ni 6%, Li 6%, Co 16%)
    Local production: Required for full EU content qualification
  ```

  ### Near-Shore Region Mapping

  ```
  Assembly in:     Near-Shore Options:
  ============     ==================
  US Southeast --> Mexico, Canada, US Midwest
  Germany      --> Poland, Czech Republic, Hungary, Spain, Portugal
  Japan        --> Thailand, Vietnam, Indonesia
  China        --> Vietnam, India, Malaysia (for export)
  Brazil       --> Argentina, Colombia
  ```


  ## Implementation Guide

  ### Step 1: TCO Comparison Model

  ```python
  # Total cost of ownership analysis
  class NearShoreTCO:
      def __init__(self, annual_volume: int, part_weight_kg: float):
          self.volume = annual_volume
          self.weight = part_weight_kg

      def calculate_scenario(self, scenario: dict) -> dict:
          """Calculate full TCO for a sourcing scenario."""
          unit_cost = scenario["piece_price"] * self.volume
          logistics = self.calc_logistics(scenario)
          inventory = self.calc_inventory_cost(scenario)
          quality = self.calc_quality_cost(scenario)
          tariff = scenario["piece_price"] * scenario["duty_rate"] * self.volume
          risk = scenario["disruption_prob"] * scenario["downtime_cost_per_day"] * scenario["avg_disruption_days"]
          carbon = self.calc_carbon_cost(scenario)
          total = unit_cost + logistics + inventory + quality + tariff + risk + carbon
          return {
              "scenario": scenario["name"],
              "unit_cost": unit_cost,
              "logistics": logistics,
              "inventory": inventory,
              "quality": quality,
              "tariff": tariff,
              "risk_adjusted": risk,
              "carbon_cost": carbon,
              "total_tco": total,
              "tco_per_unit": total / self.volume,
          }

      def calc_logistics(self, s: dict) -> float:
          freight = s["freight_per_kg"] * self.weight * self.volume
          customs = s["customs_clearance"] * (self.volume / s["parts_per_container"])
          return freight + customs

      def calc_inventory_cost(self, s: dict) -> float:
          pipeline_weeks = s["transit_time_weeks"]
          safety_weeks = s["safety_stock_weeks"]
          weekly_demand_value = (self.volume / 52) * s["piece_price"]
          carrying_rate = 0.20  # 20% annual carrying cost
          return (pipeline_weeks + safety_weeks) * weekly_demand_value * carrying_rate
  ```

