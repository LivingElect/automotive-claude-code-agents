  ### Step 3: Site Selection Scoring

  ```python
  # Weighted multi-criteria site evaluation
  class SiteSelector:
      CRITERIA = {
          "labor_cost": 0.15,
          "labor_availability": 0.12,
          "logistics_proximity": 0.15,
          "infrastructure_quality": 0.10,
          "trade_agreement_benefit": 0.12,
          "energy_cost_and_green": 0.08,
          "political_stability": 0.10,
          "ip_protection": 0.08,
          "supplier_ecosystem": 0.10,
      }

      def evaluate_site(self, site: dict) -> dict:
          """Score candidate site on weighted criteria (1-10 scale)."""
          weighted_score = sum(
              site["scores"][criterion] * weight
              for criterion, weight in self.CRITERIA.items()
          )
          return {
              "site": site["name"],
              "country": site["country"],
              "weighted_score": round(weighted_score, 2),
              "strengths": [c for c, w in self.CRITERIA.items() if site["scores"][c] >= 8],
              "weaknesses": [c for c, w in self.CRITERIA.items() if site["scores"][c] <= 4],
          }
  ```

  ### Step 4: Production Transfer Plan

  ```
  Month 1-3:   Supplier selection and tooling order
  Month 4-9:   Tool build, first articles, PPAP
  Month 10-12: Parallel production (old and new source)
  Month 13-15: Volume ramp at new source (20% -> 50% -> 80%)
  Month 16-18: Full transfer, decommission old source
  Month 19+:   Performance monitoring and optimization
  ```


  ## Best Practices

  - Never compare piece price alone -- always use full TCO including risk and carbon
  - Maintain dual sourcing during transition (minimum 6 months parallel production)
  - Invest in supplier development -- near-shore suppliers may need quality system upgrades
  - Factor in regional content requirements early -- they determine eligible sourcing regions
  - Account for currency risk when comparing cross-border scenarios
  - Consider vertical integration for critical components when suppliers are scarce
  - Engage trade compliance experts for rules of origin calculation before committing
  - Plan for automation investment at near-shore sites to offset higher labor costs


  ## Common Patterns

  ### Decision Framework

  ```
  Near-shore when:                      Keep offshore when:
  ================                      ==================
  Lead time > 6 weeks                   Unit cost delta > 40%
  Single-source risk = high             Volume justifies dedicated ship
  Regional content required             Technology only available offshore
  Quality issues from distance          Mature supply base exists
  Carbon cost significant               Low disruption history
  High engineering change frequency      Commodity with multiple global sources
  ```

  ### Phased Migration Strategy

  ```
  Phase 1: Move high-risk single-source components (12 months)
  Phase 2: Move bulky/heavy parts where logistics cost dominates (18 months)
  Phase 3: Move engineered components requiring close collaboration (24 months)
  Phase 4: Move remaining commodities where TCO favors near-shore (36 months)
  ```


  ## Troubleshooting

  - **Higher piece price kills business case**: Include disruption risk cost and carbon cost
  - **No qualified suppliers in target region**: Invest in supplier development program
  - **Rules of origin calculation complex**: Use customs broker with automotive specialization
  - **Quality gap at new supplier**: Place resident engineer, implement intensive SPC program
  - **Labor shortage at near-shore site**: Partner with local technical schools, invest in automation
  - **Currency volatility undermines savings**: Use natural hedging (revenue and cost in same currency)

constraints:
- Supplier qualification for automotive takes 12-24 months minimum
- Regional content rules add complexity to multi-region sourcing decisions
- Near-shore labor costs are rising, reducing arbitrage window
- Capital investment in new tooling required for each production transfer
