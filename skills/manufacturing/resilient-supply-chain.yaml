instructions: |
  # Resilient Supply Chain Design

  ## Overview
  Modern automotive supply chains span 4-8 tiers across 30+ countries with thousands
  of unique part numbers per vehicle. A single disruption from semiconductor shortages,
  port closures, natural disasters, or geopolitical conflict can halt entire production
  lines within days. Resilient supply chain design builds redundancy, visibility, and
  agility into supplier networks to maintain production continuity under stress.

  ## Key Concepts

  ### Supply Chain Risk Categories
  Risks are classified into four tiers requiring independent assessment:

  - Tier 1 risks: Direct supplier failures including bankruptcy, quality escapes, capacity shortfalls
  - Tier 2 risks: Sub-tier material shortages such as semiconductor wafers and rare earth minerals
  - Tier 3 risks: Logistics disruptions from port closures, carrier failures, route blockages
  - Tier 4 risks: Systemic events including pandemics, trade wars, and regulatory changes

  ### Multi-Source Strategy Matrix
  Classify every component by criticality and availability:

  - Critical + Scarce: Triple-source with safety stock and long-term contracts
  - Critical + Available: Dual-source with qualified backup suppliers
  - Non-critical + Scarce: Dual-source with design-for-substitution
  - Non-critical + Available: Single-source with monitored backup options

  ### Supplier Health Scoring
  Continuously monitor supplier viability using weighted composite scoring across
  financial stability, quality performance, delivery reliability, geographic risk,
  and capacity utilization dimensions.

  ## Implementation Guide

  ### Step 1 - Map the Current Supply Network
  Document every supplier relationship down to tier 3 minimum. Identify single
  points of failure and geographic concentration zones.

  ```python
  from dataclasses import dataclass, field

  @dataclass
  class SupplierNode:
      supplier_id: str
      name: str
      region: str
      tier: int
      components: list[str] = field(default_factory=list)
      alternate_suppliers: list[str] = field(default_factory=list)
      risk_score: float = 0.0
      lead_time_days: int = 0

  @dataclass
  class SupplyChainMap:
      nodes: dict[str, SupplierNode] = field(default_factory=dict)

      def find_single_points_of_failure(self) -> list[str]:
          """Identify components with only one qualified supplier."""
          component_suppliers: dict[str, list[str]] = {}
          for node in self.nodes.values():
              for component in node.components:
                  if component not in component_suppliers:
                      component_suppliers[component] = []
                  component_suppliers[component].append(node.supplier_id)
          return [
              comp for comp, suppliers in component_suppliers.items()
              if len(suppliers) == 1
          ]
  ```

  ### Step 2 - Establish Risk Monitoring
  Deploy automated monitoring that tracks supplier health indicators and triggers
  alerts when thresholds are breached.

  ```python
  ALERT_THRESHOLDS = {
      "health_score_critical": 40.0,
      "health_score_warning": 60.0,
      "lead_time_increase_pct": 25.0,
      "quality_reject_rate_pct": 2.0,
  }

  def evaluate_supplier_alerts(
      supplier_id: str,
      current_metrics: dict,
  ) -> list[dict]:
      """Generate alerts when supplier metrics breach thresholds."""
      alerts = []
      health = current_metrics.get("health_score", 100.0)
      if health < ALERT_THRESHOLDS["health_score_critical"]:
          alerts.append({
              "level": "CRITICAL",
              "supplier": supplier_id,
              "message": f"Health score {health} below critical threshold",
          })
      elif health < ALERT_THRESHOLDS["health_score_warning"]:
          alerts.append({
              "level": "WARNING",
              "supplier": supplier_id,
              "message": f"Health score {health} below warning threshold",
          })
      return alerts
  ```

  ### Step 3 - Disruption Response Playbook
  For each critical component, document step-by-step recovery actions:

  ```
  Hour 0-4:   Detect via control tower alert or supplier notification
  Hour 4-24:  Assess inventory levels, production impact, alternative sources
  Day 1-3:    Contain by expediting shipments, activating safety stock
  Day 3-14:   Recover by qualifying alternatives, air freight, production replan
  Day 14+:    Normalize by replenishing stock, updating risk assessment
  ```

  ### Step 4 - Build Contingency Contracts
  Pre-negotiate capacity reservation agreements with backup suppliers. Include
  volume flexibility clauses allowing plus or minus 20 percent adjustments.
  Maintain qualification status for at least two suppliers per critical component.

  ## Best Practices
  - Maintain at least 2 qualified suppliers for every safety-critical component
  - Conduct quarterly business reviews with tier 1 suppliers
  - Run annual supply chain stress tests simulating major disruption scenarios
  - Keep 4-8 weeks of safety stock for components with lead times over 12 weeks
  - Require tier 1 suppliers to disclose their own sub-tier dependencies
  - Diversify geographically so no single region supplies more than 40 percent of parts
  - Integrate supplier financial monitoring feeds for early bankruptcy warning
  - Share demand forecasts with tier 2 and tier 3 to reduce bullwhip effect
  - Standardize components across platforms to increase sourcing flexibility

  ## Troubleshooting
  - Supplier refuses to disclose sub-tier sources: Make transparency a contractual
    requirement during qualification, offer NDA protection for sensitive relationships
  - Cost increase from multi-sourcing: Quantify the cost of single-source disruption
    in lost production days times daily revenue to justify the 3-8 percent premium
  - Quality variation between alternate suppliers: Implement identical incoming
    inspection criteria and PPAP requirements, conduct regular correlation studies
  - Lead time data is unreliable: Deploy automated shipment tracking integrated with
    supplier ERP systems, calculate rolling averages from actual receipt data
  - Geopolitical risk changes rapidly: Subscribe to real-time risk feeds from
    services like Everstream or Resilinc for continuous country risk monitoring
  - Safety stock cost objections: Present production downtime cost per hour versus
    holding cost analysis to justify buffer investment
