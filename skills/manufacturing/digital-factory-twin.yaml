description: Expert skill in creating and managing virtual factory digital twins for real-time simulation, optimization, and predictive analytics.
use_cases:
- Factory layout optimization and material flow analysis
- Real-time production monitoring and synchronization
- Bottleneck identification and capacity planning
- Virtual commissioning before physical installation
- What-if scenario analysis for process changes
