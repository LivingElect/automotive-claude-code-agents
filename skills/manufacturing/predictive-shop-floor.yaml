  ## Best Practices

  - Start with equipment that has highest downtime cost and sufficient sensor data
  - Require minimum 3 run-to-failure cycles for supervised RUL model training
  - Use anomaly detection (unsupervised) when failure data is insufficient
  - Validate model predictions against actual failures for at least 3 months before trusting
  - Integrate predictive alerts with CMMS for automatic work order generation
  - Retrain models quarterly as equipment ages and operating conditions change
  - Show maintenance technicians the data behind predictions to build trust
  - Track prediction accuracy KPIs: precision, recall, lead time of true positive alerts


  ## Common Patterns

  ### Predictive Maintenance Implementation Sequence

  ```
  Month 1-2:  Instrument top 10 critical machines with vibration and temperature
  Month 3-4:  Collect baseline data, establish normal operating profiles
  Month 5-6:  Train initial anomaly detection models (unsupervised)
  Month 7-9:  Deploy alerts to maintenance team, collect feedback
  Month 10-12: Train supervised RUL models as failure data accumulates
  Year 2+:    Scale to 50+ machines, integrate with CMMS and scheduling
  ```

  ### Model Selection by Data Availability

  ```
  Data Availability         Recommended Model         Training Data
  ====================      ====================      =============
  Many run-to-failure       Gradient Boosting RUL     Labeled lifecycle data
  Few failures, many sensors  Anomaly detection       Normal operation only
  Time series patterns      LSTM / Temporal CNN       Sequential sensor data
  Known physics model       Physics-informed ML       Hybrid simulation+data
  No historical data        Rule-based thresholds     Expert knowledge
  ```


  ## Troubleshooting

  - **Too many false alarms**: Increase alert threshold, require sustained anomaly signal
  - **Missed failure prediction**: Check sensor coverage, add relevant signals
  - **Model accuracy degrades over time**: Implement automated drift detection, schedule retraining
  - **Insufficient failure data for training**: Use transfer learning from similar equipment types
  - **Maintenance team ignores alerts**: Show prediction accuracy scorecard, reduce false positive rate
  - **Data quality issues**: Validate sensor health, implement data quality checks in pipeline

constraints:
- Sufficient run-to-failure data needed for supervised RUL models (often scarce)
- Sensor retrofit on legacy equipment may require downtime for installation
- Model predictions are probabilistic, not deterministic -- false alarms will occur
- IT/OT network integration requires cybersecurity review per IEC 62443
