instructions: |

  ## Overview

  Swarm robotics applies decentralized coordination principles from biological swarms (ants,
  bees, fish schools) to fleets of autonomous robots in automotive factories. Unlike centralized
  fleet management where a single server dispatches all robots, swarm systems use local
  communication and simple behavioral rules to achieve emergent global coordination.

  This approach provides inherent resilience -- no single point of failure -- and scalability,
  as adding robots does not increase central computation load. For automotive manufacturing
  with 50-200+ AGVs/AMRs operating simultaneously, swarm intelligence enables real-time
  adaptive routing that centralized systems struggle to achieve.


  ## Key Concepts

  ### Swarm Intelligence Algorithms

  - **Ant Colony Optimization (ACO)**: Pheromone-based path optimization for routing
  - **Particle Swarm Optimization (PSO)**: Velocity-based search for task allocation
  - **Bee Algorithm**: Waggle-dance-inspired resource allocation and task assignment
  - **Reynolds Flocking**: Separation, alignment, cohesion for formation movement
  - **Stigmergy**: Indirect communication through environment modification

  ### Communication Architectures

  - **Direct**: Robot-to-robot (WiFi mesh, UWB, IR)
  - **Stigmergic**: Shared environment markers (virtual pheromones in digital map)
  - **Broadcast**: All robots receive same message (beacons, shared topic)
  - **Hybrid**: Local direct + cloud aggregation for global optimization

  ### Fleet Composition for Automotive

  - **Transport AGV (1-5 ton)**: Body-in-white, battery packs, engine/motor assemblies
  - **Kitting AMR (100-500 kg)**: Parts delivery to assembly stations in sequence
  - **Tugger trains**: Multiple carts pulled by lead AGV for bulk material
  - **Micro-AGV (<50 kg)**: Small parts, fasteners, clips to point-of-use
  - **Inspection drones**: Aerial or ground-based quality scanning swarms


  ## Implementation Guide

  ### Step 1: Swarm Behavior Design

  ```python
  # Ant Colony Optimization for factory routing
  import numpy as np

  class AntColonyRouter:
      def __init__(self, factory_graph: dict, num_ants: int = 50):
          self.graph = factory_graph
          self.num_ants = num_ants
          self.pheromone = {edge: 1.0 for edge in factory_graph["edges"]}
          self.alpha = 1.0  # pheromone weight
          self.beta = 2.0   # distance weight
          self.evaporation = 0.1

      def find_route(self, start: str, goal: str, iterations: int = 100) -> list:
          """Find optimal route using ant colony optimization."""
          best_route = None
          best_cost = float("inf")
          for _ in range(iterations):
              routes = [self.ant_walk(start, goal) for _ in range(self.num_ants)]
              for route, cost in routes:
                  if cost < best_cost:
                      best_route, best_cost = route, cost
              self.update_pheromones(routes)
          return best_route

      def update_pheromones(self, routes: list):
          """Evaporate and deposit pheromones based on route quality."""
          for edge in self.pheromone:
              self.pheromone[edge] *= (1 - self.evaporation)
          for route, cost in routes:
              deposit = 1.0 / cost
              for edge in route:
                  self.pheromone[edge] += deposit
  ```

  ### Step 2: Robot Behavior State Machine

  ```python
  # Individual robot behavior in swarm
  from enum import Enum

  class RobotState(Enum):
      IDLE = "idle"
      SEEKING_TASK = "seeking_task"
      NAVIGATING = "navigating"
      LOADING = "loading"
      DELIVERING = "delivering"
      CHARGING = "charging"
      YIELDING = "yielding"

  class SwarmRobot:
      def __init__(self, robot_id: str, swarm_network):
          self.id = robot_id
          self.state = RobotState.IDLE
          self.network = swarm_network
          self.battery_pct = 100.0

      def update(self):
          """Main behavior loop -- runs at 10 Hz."""
          if self.battery_pct < 15:
              self.state = RobotState.CHARGING
              self.navigate_to_nearest_charger()
              return
          if self.state == RobotState.IDLE:
              task = self.bid_for_task()
              if task:
                  self.state = RobotState.NAVIGATING
          elif self.state == RobotState.NAVIGATING:
              self.follow_pheromone_trail()
              self.avoid_neighbors(min_distance_m=1.5)
              if self.reached_destination():
                  self.state = RobotState.LOADING

      def bid_for_task(self):
          """Auction-based task allocation -- closest capable robot wins."""
          available_tasks = self.network.get_open_tasks()
          if not available_tasks:
              return None
          best_task = min(available_tasks, key=lambda t: self.distance_to(t["pickup"]))
          return self.network.submit_bid(self.id, best_task, self.distance_to(best_task["pickup"]))
  ```

