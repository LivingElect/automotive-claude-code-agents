  ### Step 4: Collision Avoidance and Traffic Management

  ```python
  # Decentralized collision avoidance
  class SwarmTrafficManager:
      SAFETY_DISTANCE_M = 2.0
      PRIORITY_RULES = {
          "loaded": 3,      # loaded robots have highest priority
          "navigating": 2,
          "returning": 1,
          "idle": 0,
      }

      def resolve_conflict(self, robot_a, robot_b) -> str:
          """Decentralized priority-based conflict resolution."""
          priority_a = self.PRIORITY_RULES.get(robot_a.state.value, 0)
          priority_b = self.PRIORITY_RULES.get(robot_b.state.value, 0)
          if priority_a != priority_b:
              yielder = "b" if priority_a > priority_b else "a"
          else:
              # Tie-breaker: robot with lower ID yields (deterministic)
              yielder = "b" if robot_a.id < robot_b.id else "a"
          return yielder

      def virtual_lane_system(self, factory_map):
          """Create virtual one-way lanes to reduce conflicts."""
          for corridor in factory_map.corridors:
              if corridor.width_m >= 4.0:
                  corridor.assign_bidirectional_lanes(lane_width_m=1.8)
              else:
                  corridor.assign_one_way(direction=corridor.primary_flow)
  ```

  ### Step 5: Fleet Health and Self-Healing

  ```
  Monitoring Architecture:
  =======================
  Each robot publishes: battery%, motor temp, task count, error codes
       |
  Neighbor robots detect: missing heartbeats, erratic movement
       |
  Swarm response: redistribute tasks, avoid failed robot zone
       |
  Supervisor alert: maintenance notification for physical recovery
  ```


  ## Best Practices

  - Design for graceful degradation: system must work with 20% of fleet offline
  - Use virtual pheromones with decay to prevent stale routing information
  - Implement priority lanes for loaded vs empty robots to maximize throughput
  - Battery charging must be swarm-managed: stagger charging to maintain fleet capacity
  - Test swarm behaviors in simulation (Isaac Sim, Gazebo) before physical deployment
  - Limit direct robot-to-robot communication range to prevent network flooding
  - Log all task assignments and route decisions for post-hoc optimization
  - Start with 5-10 robots, validate emergent behavior, then scale incrementally


  ## Common Patterns

  ### Material Delivery Swarm Cycle

  1. MES publishes material request with station ID and urgency
  2. Nearby idle robots calculate bid (distance + battery + queue position)
  3. Winning robot navigates to warehouse pickup using ACO-optimized route
  4. Robot loads material, updates virtual pheromone map with route timing
  5. Robot delivers to station, operator confirms receipt
  6. Robot evaluates: seek next task or navigate to charger based on battery

  ### Swarm Scaling Strategy

  ```
  Phase 1 (Pilot):     5-10 robots, single zone, centralized supervisor
  Phase 2 (Expansion): 20-50 robots, multi-zone, hybrid coordination
  Phase 3 (Full):      100+ robots, factory-wide, fully decentralized
  Phase 4 (Multi-site): Cross-factory coordination via cloud aggregation
  ```


  ## Troubleshooting

  - **Deadlock between robots**: Implement timeout-based yielding with random backoff
  - **Pheromone convergence to suboptimal routes**: Increase exploration rate (epsilon-greedy)
  - **WiFi congestion with large fleets**: Use UWB for proximity, WiFi only for task data
  - **Uneven task distribution**: Add load-balancing term to bidding function
  - **Charging station queues**: Deploy mobile charging robots or increase station count
  - **Emergent oscillation in corridors**: Add hysteresis to direction-change decisions

