- 3D safety cameras (SICK safeVisionary2, Pilz SafetyEYE)
- Safety PLCs (Pilz PSS 4000, Siemens S7-1500F)
- Force/torque sensors (ATI, OnRobot, Robotiq)
- Contact force measurement (CBSF, PFL measurement devices)
