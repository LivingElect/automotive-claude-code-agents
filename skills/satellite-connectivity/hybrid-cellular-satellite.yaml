description: >
  Skill for designing seamless hybrid cellular and satellite connectivity
  systems for vehicles, covering multi-access network management, handover
  algorithms, connection bonding, quality of service management, and cost-
  aware traffic routing between terrestrial and satellite links.
use_cases:
  - "Designing always-connected vehicle architectures combining 4G/5G and LEO satellite"
  - "Implementing seamless handover algorithms between cellular and satellite links"
  - "Bonding cellular and satellite connections for increased throughput and reliability"
