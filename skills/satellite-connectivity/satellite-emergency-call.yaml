description: >
  Skill for implementing satellite-based emergency call (eCall) systems for
  vehicles operating beyond terrestrial cellular coverage, covering satellite
  eCall architecture, message protocols, crash detection integration,
  emergency response coordination, and regulatory compliance for satellite-
  augmented vehicle safety communication.
