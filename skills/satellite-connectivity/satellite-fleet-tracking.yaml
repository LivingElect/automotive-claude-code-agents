domain: global-fleet-management
description: >
  Skill for implementing satellite-based global fleet tracking and management
  systems, covering position reporting, geofencing, asset monitoring, two-way
  messaging, and hybrid tracking architectures for commercial vehicle fleets
  operating beyond cellular coverage areas.
use_cases:
  - "Deploying satellite tracking for mining and construction vehicle fleets in remote areas"
  - "Implementing global container and trailer tracking with satellite position reporting"
  - "Designing geofencing and route compliance monitoring via satellite for regulated fleets"
  - "Integrating satellite telemetry for vehicle health monitoring in off-grid operations"
  - "Building hybrid cellular-satellite tracking platforms with seamless coverage transitions"
  - "Optimizing satellite message costs through intelligent reporting strategies"
automotive_standards:
