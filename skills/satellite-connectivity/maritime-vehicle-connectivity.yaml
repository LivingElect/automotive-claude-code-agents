description: >
  Skill for designing satellite connectivity solutions for vehicles on
  maritime transport platforms including ferries, car carriers, and roll-on
  roll-off ships, covering shipboard vehicle management, over-water
  connectivity, embarkation and disembarkation automation, vehicle condition
  monitoring, and cross-border connectivity transitions.
