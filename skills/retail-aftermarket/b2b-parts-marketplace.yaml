  ## Approach

  When building a B2B parts marketplace:

  1. **Design the Platform Architecture**
     - Multi-tenant marketplace with buyer and seller portals
     - Parts catalog with VIN decode and fitment verification
     - Full-text and parametric search with relevance ranking
     - Shopping cart with multi-vendor order splitting
     - API gateway for ERP and DMS system integration

  2. **Build the Parts Catalog**
     - Ingest OEM and aftermarket data in ACES/PIES format
     - Map vehicle applications using VIN to parts fitment data
     - Create cross-reference index for OEM to aftermarket numbers
     - Implement data quality scoring and improvement automation

  3. **Onboard Suppliers**
     - Digital onboarding with qualification documentation
     - Inventory feed setup via API, SFTP, or EDI connection
     - Quality and fulfillment performance SLA agreements
     - Payment terms configuration and settlement schedule

  4. **Enable Procurement Workflows**
     - VIN-based parts lookup for service order accuracy
     - Automated RFQ for bulk or specialized part requests
     - Approval workflows for high-value purchases
     - Recurring order automation for routine maintenance parts

  ## VIN-Based Parts Lookup

  ```python
  class VINPartsLookup:
      def __init__(self, vin_decoder, fitment_db):
          self.decoder = vin_decoder
          self.fitment = fitment_db

      def find_parts(self, vin, category):
          """Find compatible parts for a vehicle by VIN."""
          vehicle = self.decoder.decode(vin)
          applications = self.fitment.query(
              make=vehicle.make, model=vehicle.model,
              year=vehicle.year, engine=vehicle.engine_code
          )
          parts = []
          for app in applications:
              if app.category == category:
                  offers = self.get_offers(app.part_number)
                  parts.append({
                      "part_number": app.part_number,
                      "description": app.description,
                      "offers": sorted(offers, key=lambda s: s.price)
                  })
          return parts
  ```

