# Tox configuration for Automotive Claude Code
# Multi-environment testing and automation

[tox]
envlist =
    py{38,39,310,311,312}
    lint
    type
    security
    docs
    coverage
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Run unit tests with pytest
deps =
    pytest>=8.3.3
    pytest-cov>=5.0.0
    pytest-asyncio>=0.23.8
    pytest-timeout>=2.2.0
    -r requirements.txt
commands =
    pytest tests/ -v \
        --cov=tools \
        --cov-report=term-missing \
        --cov-report=html \
        --cov-report=xml \
        --timeout=300 \
        {posargs}

[testenv:lint]
description = Run code linting with ruff and black
skip_install = true
deps =
    black>=24.8.0
    ruff>=0.6.9
    isort>=5.13.2
commands =
    black --check --diff tools/ tests/
    ruff check tools/ tests/
    isort --check-only --diff tools/ tests/

[testenv:format]
description = Auto-format code with black and isort
skip_install = true
deps =
    black>=24.8.0
    isort>=5.13.2
    ruff>=0.6.9
commands =
    black tools/ tests/
    isort tools/ tests/
    ruff check --fix tools/ tests/

[testenv:type]
description = Run type checking with mypy
deps =
    mypy>=1.11.2
    types-PyYAML
    -r requirements.txt
commands =
    mypy tools/ --ignore-missing-imports {posargs}

[testenv:security]
description = Run security checks with bandit and safety
skip_install = true
deps =
    bandit[toml]>=1.7.9
    safety>=3.2.0
commands =
    bandit -r tools/ -c pyproject.toml
    safety check --json --output safety-report.json
    safety check

[testenv:docs]
description = Build documentation with mkdocs
deps =
    mkdocs>=1.6.1
    mkdocs-material>=9.5.39
    mkdocstrings>=0.24.0
    mkdocs-mermaid2-plugin>=1.1.1
commands =
    mkdocs build --clean --strict

[testenv:docs-serve]
description = Serve documentation locally
deps =
    mkdocs>=1.6.1
    mkdocs-material>=9.5.39
    mkdocstrings>=0.24.0
    mkdocs-mermaid2-plugin>=1.1.1
commands =
    mkdocs serve

[testenv:coverage]
description = Generate coverage report
deps =
    pytest>=8.3.3
    pytest-cov>=5.0.0
    coverage[toml]>=7.6.0
    -r requirements.txt
commands =
    pytest tests/ --cov=tools --cov-report=html --cov-report=term --cov-report=xml
    coverage report --fail-under=70
    coverage html

[testenv:integration]
description = Run integration tests
deps =
    pytest>=8.3.3
    pytest-asyncio>=0.23.8
    pytest-timeout>=2.2.0
    -r requirements.txt
commands =
    pytest tests/integration/ -v --timeout=600 {posargs}

[testenv:e2e]
description = Run end-to-end tests
deps =
    pytest>=8.3.3
    pytest-asyncio>=0.23.8
    pytest-timeout>=2.2.0
    -r requirements.txt
commands =
    pytest tests/e2e/ -v --timeout=1200 {posargs}

[testenv:automotive]
description = Run automotive-specific tests
deps =
    pytest>=8.3.3
    python-can>=4.4.2
    cantools>=39.4.5
    -r requirements.txt
commands =
    pytest tests/ -k "can or autosar or battery or adas" -v {posargs}

[testenv:benchmark]
description = Run performance benchmarks
deps =
    pytest>=8.3.3
    pytest-benchmark>=4.0.0
    -r requirements.txt
commands =
    pytest tests/performance/ --benchmark-only --benchmark-json=benchmark.json {posargs}

[testenv:clean]
description = Clean build artifacts and cache
skip_install = true
allowlist_externals =
    rm
    find
commands =
    rm -rf build dist *.egg-info
    rm -rf .pytest_cache .coverage htmlcov coverage.xml
    rm -rf .mypy_cache .ruff_cache
    find . -type d -name __pycache__ -exec rm -rf {} +
    find . -type f -name "*.pyc" -delete

[testenv:build]
description = Build distribution packages
skip_install = true
deps =
    build>=1.2.0
    twine>=5.1.0
commands =
    python -m build
    twine check dist/*

[testenv:validate]
description = Validate YAML configurations
skip_install = true
deps =
    pyyaml>=6.0.2
    yamllint>=1.35.1
commands =
    yamllint -d relaxed skills/ agents/ commands/ workflows/
    python -m tools.validators.skill_validator
    python -m tools.validators.agent_validator

[testenv:dev]
description = Development environment with all dependencies
usedevelop = true
deps =
    -r requirements.txt
    pytest>=8.3.3
    pytest-cov>=5.0.0
    pytest-asyncio>=0.23.8
    black>=24.8.0
    ruff>=0.6.9
    mypy>=1.11.2
    ipython>=8.12.0
    ipdb>=0.13.13
commands =
    python -c "print('Development environment ready')"

# Pytest configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short

# Coverage configuration
[coverage:run]
source = tools
omit =
    */tests/*
    */test_*.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
